name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy boldpawn.com
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install CDK CLI
        run: npm ci

      - name: Download Go modules
        run: go mod download

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: boldpawn-deploy-${{ github.run_id }}

      - name: Build MCP Lambda package
        run: npm run build:mcp

      - name: Bootstrap CDK environments
        run: npx cdk bootstrap --qualifier cloudfront aws://139702123223/eu-west-1 aws://139702123223/us-east-1

      - name: Deploy CDK stack
        run: npm run deploy
