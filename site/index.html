<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Boldpawn</title>
    <meta name="description" content="Boldpawn.com">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="intro" aria-labelledby="site-title">
        <div class="brand-mark" aria-hidden="true">
          <span></span>
        </div>
        <div>
          <p class="eyebrow">boldpawn.com</p>

    </main>
